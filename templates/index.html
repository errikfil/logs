<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Drone Log Viewer</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:40px;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            max-width:700px;
            margin:auto;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            margin-top:0;
        }

        form{
            margin-top:20px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        input[type="file"]{
            margin-bottom:20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🚁 Drone Log Viewer</h1>

    <p>Ανέβασε DJI log αρχείο</p>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <input type="file" name="logfile">

        <br>

        <button type="submit">
            Upload Log
        </button>

    </form>

</div>

</body>
</html>
